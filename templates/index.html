<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyPrint Dashboard | Smart Extrusion</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/toast.css') }}">
    <!-- Chart.js for Historical Data -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Native MQTT Client (WebSocket bridge) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
    <div id="toast-container"></div>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <span class="neon-text">RECY</span>PRINT
                <span id="system-badge" style="margin-left:15px; font-size: 0.9rem; padding: 4px 10px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border);">Standby</span>
            </div>
            
            <div class="header-right" style="display: flex; align-items: center; gap: 2rem;">
                <a href="/history" style="color: var(--accent-primary); text-decoration: none; font-weight: bold; font-family: var(--font-display); background: rgba(14, 165, 233, 0.1); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--accent-glow); transition: 0.3s;">📊 LOGS & EXPORT</a>
                
                <div class="status-indicator">
                    <div class="dot" id="connection-dot"></div>
                    <span id="connection-status">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="grid-layout">
            <!-- Live Process Data -->
            <section class="panel glass-panel live-data">
                <h2 class="panel-title">Live Process Data</h2>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-icon">🔥</div>
                        <div class="metric-info">
                            <span class="metric-label">Temperature</span>
                            <div class="metric-value"><span id="live-temp">--</span> °C</div>
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-icon">⚙️</div>
                        <div class="metric-info">
                            <span class="metric-label">Motor Speed (0-255)</span>
                            <div class="metric-value"><span id="live-speed">--</span></div>
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-icon">📏</div>
                        <div class="metric-info">
                            <span class="metric-label">Filament Diameter</span>
                            <div class="metric-value"><span id="live-diameter">--</span> mm</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Remote Control -->
            <section class="panel glass-panel remote-control">
                <h2 class="panel-title">Remote Control</h2>
                
                <div class="auto-mode-banner" style="background: rgba(14, 165, 233, 0.05); border: 1px dashed var(--accent-glow); padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                    <span style="font-family: var(--font-display); font-size: 0.9rem; color: var(--accent-primary); letter-spacing: 1px; display: block; font-weight: bold;">AUTOMATIC MODE ACTIVATED</span>
                    <span style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-top: 5px;">Temp: 185°C | Target Dia: 1.75mm</span>
                </div>

                <div class="action-buttons" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; gap: 0.5rem; width: 100%;">
                        <button id="btn-start" class="btn btn-success glow-effect" style="flex: 1;">START EXTRUSION</button>
                        <button id="btn-stop" class="btn btn-danger glow-effect" style="flex: 1;">STOP EXTRUSION</button>
                    </div>
                    <button id="btn-tare" class="btn glow-effect" style="width: 100%; background: rgba(14, 165, 233, 0.15); border: 1px solid var(--accent-glow); color: var(--accent-primary);">TARE DIAMETER GAUGE (Z)</button>
                </div>
            </section>

            <!-- History Trend -->
            <section class="panel glass-panel history-trend">
                <h2 class="panel-title">Temperature Trend (Real-time)</h2>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- Main Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
