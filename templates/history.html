<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyPrint | History Logs</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background-color: rgba(14, 165, 233, 0.1);
            color: var(--accent-primary);
            font-family: var(--font-display);
            letter-spacing: 1px;
            font-weight: 600;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-export {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
            padding: 10px 20px;
            text-decoration: none;
            font-family: var(--font-display);
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-export:hover {
            background: var(--success);
            color: #fff;
            box-shadow: 0 0 15px var(--success);
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <span class="neon-text">RECY</span>PRINT <span style="color:var(--text-muted); font-size:1.2rem;">/ Reports</span>
            </div>
            <a href="/" class="btn-back">⬅ Return to Live Dashboard</a>
        </header>

        <!-- Main Content -->
        <main class="panel glass-panel">
            <div class="action-bar">
                <div>
                    <h2 class="panel-title" style="margin-bottom: 5px; border:none; padding:0;">Historical Sensor Logs</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem;">Viewing the last 100 recorded data points from the system's database.</p>
                </div>
                <a href="/export/csv" class="btn-export glow-effect">⬇ Export to Excel (CSV)</a>
            </div>

            <div class="table-container">
                <table id="logs-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Temperature (°C)</th>
                            <th>Motor Speed (0-255)</th>
                            <th>Filament Diameter (mm)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" style="text-align:center;">Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Fetch logs on page load
        fetch('/api/logs')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('#logs-table tbody');
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No sensor data recorded yet.</td></tr>';
                    return;
                }

                data.forEach(log => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:var(--text-muted);">${log.timestamp}</td>
                        <td style="font-weight:bold; color:var(--accent-primary);">${log.temperature.toFixed(2)}</td>
                        <td>${log.speed.toFixed(1)}</td>
                        <td>${log.diameter.toFixed(3)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                document.querySelector('#logs-table tbody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--danger);">Error loading logs.</td></tr>';
                console.error(err);
            });
    </script>
</body>
</html>
