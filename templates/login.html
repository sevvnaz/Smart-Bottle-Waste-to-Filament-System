<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyPrint | Login</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-ui);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-transform: uppercase;
            color: white;
            background: rgba(14, 165, 233, 0.2);
            border: 1px solid var(--accent-primary);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="login-page">
            <div class="panel glass-panel login-card">
                <div class="login-logo">
                    <span class="neon-text">RECY</span>PRINT
                </div>
                
                {% if error %}
                <div class="error-message">
                    ⚠️ {{ error }}
                </div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-input" type="text" id="username" name="username" required autocomplete="username" placeholder="Enter username">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
                    </div>
                    
                    <button type="submit" class="btn-login">Access Dashboard</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
